name: Automated Data Preprocessing Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Mencegah workflow berjalan bersamaan dan bikin bentrok
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        # Mengambil riwayat git secara penuh agar proses pull/rebase berjalan lancar
        fetch-depth: 0 

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn

    # 4. Menjalankan file otomasi python
    - name: Run Preprocessing Script
      run: |
        python preprocessing/automate_syuhadaaqlulhafiz.py

    # 5. Commit kembali file "JobDataset_preprocessed.csv"
    - name: Commit and Push Preprocessed Data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add preprocessing/JobDataset_preprocessed.csv
        
        # Cek jika ada perubahan, lakukan commit, pull rebase baru push
        if ! git diff --quiet || ! git diff --staged --quiet; then
          git commit -m "🤖 Auto-updated preprocessed dataset via GitHub Actions"
          
          # AMBIL PERUBAHAN TERBARU DULU AGAR TIDAK REJECTED
          git pull origin main --rebase
          
          git push origin main
        fi
